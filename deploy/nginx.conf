# deploy/nginx.conf -- GitHub issue #31 subtask 6.2.2.
#
# Reverse-proxy config baked into the `ui` service's image (see deploy/ui.Dockerfile).
# Serves the built Vite/React static bundle and proxies same-origin API calls through to the
# `api` gateway service (Docker Compose's embedded DNS resolves the hostname `api` to that
# service's container -- see deploy/docker-compose.yml), so ui/src/routes/*.tsx's existing
# relative fetch("/query"), fetch("/graph"), fetch("/files"), fetch("/admin") calls work
# unmodified, with no CORS setup and no client-side base-URL change.
#
# Disclosed design decision -- /query path collision (see this run's architecture-discovery.md
# for full reasoning): "/query" is BOTH a react-router client-side route (rendered on a GET
# page-load/refresh) and a real POST-only API endpoint (api/routes/query.go, which replies 405
# Method Not Allowed to any non-POST method -- see query.go:59-60, confirmed live via
# `curl -X GET .../query` -> 405 in this run's manual verification). A plain
# `location /query { proxy_pass ...; }` would surface that 405 to a hard-refresh/direct
# navigation instead of letting the SPA boot. Rather than duplicating "which methods api
# accepts" logic into an nginx `if ($request_method = ...)` block (which also interacts badly
# with an unconditional `proxy_pass` in the same location -- confirmed by hand: the rewritten
# URI still gets proxied instead of served locally, since `rewrite ... break` only stops
# further rewrite-phase processing, not the location's already-selected content handler), this
# proxies every request to api first and uses `error_page 405` to internally redirect ONLY
# api's actual 405 responses to the SPA shell. This keeps method-handling logic in exactly one
# place (api/routes/query.go) instead of two.
#
# /graph, /files, /admin intentionally do NOT get their own proxy location in this subtask:
# api/routes/query.go's RegisterRoutes only wires /query and /health today (confirmed in
# requirement.md's "out of scope" list) -- proxying would only ever turn into a 404 from api
# instead of the SPA, which is worse for the demo than falling through to the SPA catch-all
# below (identical behavior to running the UI with no reverse proxy at all, i.e. no
# regression). Implementing those Go handlers is separate subtask work, not this one.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Dedicated health-check passthrough -- this subtask's acceptance test curls this route
    # directly against the api container, but proxying it here too lets a browser/demo user
    # hit the same origin as everything else.
    location = /health {
        proxy_pass http://api:8080/health;
        proxy_set_header Host $host;
    }

    location /query {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_intercept_errors on;
        error_page 405 = @spa_shell;
    }

    # Named location used only as error_page 405's internal-redirect target above -- serves
    # the SPA shell so a GET/hard-refresh on /query renders the client-side query view instead
    # of surfacing api's raw 405 body.
    location @spa_shell {
        rewrite ^ /index.html break;
    }

    # SPA catch-all: every other path (/, /ingest, /graph, /files, /admin, static assets)
    # falls back to index.html so react-router-dom's client-side routing (see ui/src/App.tsx)
    # can take over, exactly as `vite preview`/any standard SPA static host would behave.
    location / {
        try_files $uri /index.html;
    }
}
