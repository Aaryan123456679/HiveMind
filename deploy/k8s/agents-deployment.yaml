# deploy/k8s/agents-deployment.yaml -- GitHub issue #31 subtask 6.2.3.
#
# Translates deploy/docker-compose.yml's `agents` service (built from
# deploy/agents.Dockerfile). Non-sensitive config from deploy/k8s/agents-config.yaml
# (ConfigMap); optional API keys from deploy/k8s/agents-secret.yaml (Secret, see
# deploy/k8s/agents-secret.example.yaml template -- NOT committed with real values).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents
  namespace: hivemind
  labels:
    app: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agents
  template:
    metadata:
      labels:
        app: agents
    spec:
      containers:
        - name: agents
          image: hivemind-agents:kindtest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: agents-config
            - secretRef:
                name: agents-secret
                optional: true
          ports:
            - containerPort: 50052
              name: grpc
          # Same dependency-free TCP-connect check baked into deploy/agents.Dockerfile's own
          # HEALTHCHECK (python3 socket.create_connection to 127.0.0.1:50052).
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: agents
  namespace: hivemind
spec:
  selector:
    app: agents
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
  type: ClusterIP
