# deploy/k8s/api-deployment.yaml -- GitHub issue #31 subtask 6.2.3.
#
# Translates deploy/docker-compose.yml's `api` service (built from deploy/api.Dockerfile).
# QUERY_PIPELINE_ADDR keeps the exact same value as compose (`agents:50052`) because
# Kubernetes' in-namespace short-name DNS resolves the `agents` Service the same way
# Compose's embedded DNS resolved the `agents` container -- see architecture-discovery.md,
# decision 2. No `depends_on`/service_healthy equivalent exists in k8s (decision 3): api's
# own gRPC client dials agents/engine lazily per request, so pod start order is not
# load-bearing here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: hivemind
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: hivemind-api:kindtest
          imagePullPolicy: IfNotPresent
          env:
            - name: QUERY_PIPELINE_ADDR
              value: "agents:50052"
            - name: PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          # Native kubelet HTTP probe against the same route deploy/api.Dockerfile's own
          # wget-based HEALTHCHECK hits (api/routes/query.go's HealthHandler, GET /health).
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: hivemind
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
